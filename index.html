<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление вертолетом</title>
    <!-- Подключаем Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-background-color, #1f1f1f);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-bottom: 10px;
            text-align: center;
        }

        /* Визуализация лопастей */
        .helicopter-rotor {
            width: 120px;
            height: 20px;
            background-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 10px;
            margin: 40px 0;
            transition: transform 0.1s linear;
            box-shadow: 0 0 15px var(--tg-theme-button-color, #2481cc);
        }

        /* Контейнер для ползунка */
        .slider-container {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            margin: 20px 0;
            -webkit-appearance: none;
            background: #444;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #2481cc);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Управление питанием лопастей</h2>
    
    <!-- Анимированный пропеллер -->
    <div class="helicopter-rotor" id="rotor"></div>

    <div class="slider-container">
        <input type="range" id="powerSlider" min="0" max="100" value="0">
        <div class="status-text">Подача тока: <span id="powerValue">0</span>%</div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем приложение на весь экран

        const slider = document.getElementById('powerSlider');
        const powerValue = document.getElementById('powerValue');
        const rotor = document.getElementById('rotor');

        let angle = 0;
        let animationFrame;
        let speed = 0;

        // Функция анимации вращения лопастей
        function animate() {
            angle += speed;
            rotor.style.transform = `rotate(${angle}deg)`;
            animationFrame = requestAnimationFrame(animate);
        }

        // Обработчик изменения ползунка
        slider.addEventListener('input', (e) => {
            const value = e.target.value;
            powerValue.textContent = value;
            
            // Рассчитываем скорость вращения (шаг угла за кадр)
            speed = (value / 100) * 45; 

            // Показываем/скрываем главную кнопку Telegram в зависимости от значения
            if (value > 0) {
                tg.MainButton.setText(`Применить мощность: ${value}%`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        });

        // Отправка данных обратно в бот при нажатии на Главную кнопку Telegram
        tg.MainButton.onClick(() => {
            const data = JSON.stringify({ power: slider.value });
            tg.sendData(data); // Отправляет данные боту и закрывает WebApp
        });

        // Запуск анимации
        animate();
    </script>
</body>
</html>
